<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockchain Explorer — TreeGrid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Blockchain Explorer</h1>
      <p>
        Click ▶ next to a block height to expand transactions. Click ▶ on an SKA
        row to expand sub-transactions.
      </p>
    </header>

    <div class="card">
      <div class="scroll-wrap">
        <table>
          <colgroup>
            <col class="c-height" />
            <col class="c-votes" />
            <col class="c-tkt" />
            <col class="c-rev" />
            <col class="c-var" />
            <col class="c-ska" />
            <col class="c-size" />
            <col class="c-age" />
          </colgroup>
          <thead>
            <tr>
              <th class="l">Height</th>
              <th class="r">Vote</th>
              <th class="r">Tkt</th>
              <th class="r">Rev</th>
              <th class="r">VAR</th>
              <th class="r">SKA</th>
              <th class="r">Size</th>
              <th class="r">Age</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="legend">
      <span class="legend-item"
        ><span class="badge bv">VAR</span> Regular VAR coin-transfer
        transactions</span
      >
      <span class="legend-item"
        ><span class="badge bs">SKA</span> SKA category — expandable to coin
        types</span
      >
      <span class="legend-item"
        ><span class="badge bsu">SKA-n</span> Individual SKA coin type
        (1–255)</span
      >
    </div>

    <script src="main.js"></script>
  </body>
</html>
